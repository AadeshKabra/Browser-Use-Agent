<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Agent</title>
    <link rel="stylesheet" href="../static/css/main.css">
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>Browser Agent</h1>
        <span>Online</span>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <!-- Messages will be added here by JS -->
        <div class="loading" id="loading">Browsing the web...</div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." autofocus>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const loading = document.getElementById('loading');

        // Send on Enter key
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.innerHTML = `<div class="bubble">${text}</div>`;
            chatArea.insertBefore(msg, loading);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            loading.classList.add('active');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                loading.classList.remove('active');
                addMessage(data.response || 'No response.', 'bot');
            } catch (err) {
                loading.classList.remove('active');
                addMessage('Server error. Is the backend running?', 'bot');
            }
        }
    </script>

</body>

</html>
