<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/main.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <div>
                <h1>Browser Agent</h1>
                <span class="header-subtitle">AI-powered web assistant</span>
            </div>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Online</span>
        </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="loading" id="loading">
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
            Browsing the web...
        </div>
    </div>

    <!-- Agent Thinking Panel -->
    <div class="memory-panel" id="memoryPanel" style="display: none;">
        <div class="memory-panel-header">
            <svg class="thinking-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a8 8 0 0 0-8 8c0 3.4 2.1 6.4 5.3 7.5.3.1.7.3.7.7V20a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2v-1.8c0-.4.4-.6.7-.7A8 8 0 0 0 12 2z"/>
                <line x1="10" y1="22" x2="14" y2="22"/>
            </svg>
            <span>Agent Thinking</span>
        </div>
        <div id="memoryLog"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask me anything..." autofocus>
            <button id="sendBtn" onclick="sendMessage()" title="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="../static/css/main.js"></script>

</body>

</html>
