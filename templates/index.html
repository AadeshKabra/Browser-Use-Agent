<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Agent</title>
    <link rel="stylesheet" href="../static/css/main.css">
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>Browser Agent</h1>
        <span>Online</span>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <!-- Messages will be added here by JS -->
        <div class="loading" id="loading">Browsing the web...</div>
    </div>

    <div class="memory-panel" id="memoryPanel" style="display: none;">
        <h3>Agent Thinking...</h3>
        <div id="memoryLog"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." autofocus>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script src="../static/css/main.js"></script>

</body>

</html>
